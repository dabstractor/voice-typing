# hypr-binds.conf — voice-typing Hyprland keybindings (PRD §4.10 + §4.2ter; P2.M1.T1.S1).
#
# WHAT THIS IS
#   Two binds:
#     SUPER+ALT+D -> voicectl toggle       (NORMAL mode: distil-large-v3 + small.en)
#     SUPER+ALT+F -> voicectl toggle-lite   (LITE mode: small.en only — faster, lower accuracy)
#   Each arms / disarms the mic in its own mode. This file is SOURCED (not copied) from your
#   hyprland.conf, so any edit here takes effect after `hyprctl reload` — no per-user copy to drift.
#
# =====================================================================
#  USER INTEGRATION  (item DOCS: Mode A — this comment IS the hotkey doc)
# =====================================================================
#  Add ONE line to ~/.config/hypr/hyprland.conf (install.sh prints it; we never edit
#  your hyprland.conf for you):
#
#      source = /home/dustin/projects/voice-typing/hypr-binds.conf
#
#  Then reload Hyprland:
#      hyprctl reload
#
#  SUPER+ALT+D arms / disarms the mic in NORMAL mode. SUPER+ALT+F does the same in LITE
#  mode (small model only — faster, lower accuracy; good for short quips/prompts).
#  The daemon must be running (start it with ./install.sh or the systemd user unit); it boots
#  NOT-listening, so the FIRST press arms it. Subsequent presses of the SAME key toggle
#  listening on/off. Each key toggles listening on/off IN ITS OWN MODE: pressing D while
#  armed-in-normal (or idle) toggles normal; pressing F while armed-in-lite (or idle) toggles
#  lite. Pressing the OTHER mode's key while armed SWITCHES modes (one bounded ~1–3 s reload)
#  — e.g. press F while armed-in-normal to switch to lite. You never need to stop first to
#  change modes.
#
# PRECEDENCE / CONFLICTS
#   Hyprland uses the LAST matching bind for a given MODS+key. So `source` this file
#   LAST (at the bottom of ~/.config/hypr/hyprland.conf) so its bind wins.
#   If SUPER+ALT+D is inert, your config may already bind it elsewhere — check
#       ~/.config/hypr/custom/keybinds.conf
#       ~/.config/hypr/hyprland/keybinds.conf
#   or rebind below to a free combo (e.g. `SUPER ALT, V`).
#
# MODS SYNTAX
#   MODS split on whitespace OR underscore: `SUPER ALT` == `SUPER_ALT` (both valid).
#   See https://wiki.hypr.land/Configuring/Basics/Binds/

bind = SUPER ALT, D, exec, /home/dustin/projects/voice-typing/.venv/bin/voicectl toggle
# PRD §4.2ter — LITE mode (small model only): faster finals + ~half the VRAM, lower accuracy.
bind = SUPER ALT, F, exec, /home/dustin/projects/voice-typing/.venv/bin/voicectl toggle-lite
