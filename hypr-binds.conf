# hypr-binds.conf — voice-typing Hyprland keybindings (PRD §4.10; P2.M1.T1.S1).
#
# WHAT THIS IS
#   One bind: SUPER+ALT+D -> voicectl toggle (arms / disarms the voice-typing mic).
#   This file is SOURCED (not copied) from your hyprland.conf, so any edit here takes
#   effect after `hyprctl reload` — no per-user copy to drift.
#
# =====================================================================
#  USER INTEGRATION  (item DOCS: Mode A — this comment IS the hotkey doc)
# =====================================================================
#  Add ONE line to ~/.config/hypr/hyprland.conf (install.sh prints it; we never edit
#  your hyprland.conf for you):
#
#      source = /home/dustin/projects/voice-typing/hypr-binds.conf
#
#  Then reload Hyprland:
#      hyprctl reload
#
#  SUPER+ALT+D arms / disarms the mic. The daemon must be running (start it with
#  ./install.sh or the systemd user unit); it boots NOT-listening, so the FIRST
#  SUPER+ALT+D press arms it. Subsequent presses toggle listening on/off.
#
# PRECEDENCE / CONFLICTS
#   Hyprland uses the LAST matching bind for a given MODS+key. So `source` this file
#   LAST (at the bottom of ~/.config/hypr/hyprland.conf) so its bind wins.
#   If SUPER+ALT+D is inert, your config may already bind it elsewhere — check
#       ~/.config/hypr/custom/keybinds.conf
#       ~/.config/hypr/hyprland/keybinds.conf
#   or rebind below to a free combo (e.g. `SUPER ALT, V`).
#
# MODS SYNTAX
#   MODS split on whitespace OR underscore: `SUPER ALT` == `SUPER_ALT` (both valid).
#   See https://wiki.hypr.land/Configuring/Basics/Binds/

bind = SUPER ALT, D, exec, /home/dustin/projects/voice-typing/.venv/bin/voicectl toggle
