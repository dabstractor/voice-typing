# hypr-binds.conf — voice-typing Hyprland keybindings (PRD §4.10 + §4.2ter; P2.M1.T1.S1).
#
# WHAT THIS IS
#   Two binds:
#     CTRL+SUPER+ALT+D -> voicectl toggle       (NORMAL / "big" model: distil-large-v3 + small.en)
#     SUPER+ALT+D      -> voicectl toggle-lite   (LITE / "little" model: small.en only)
#   Each arms / disarms the mic in its own mode. This file is SOURCED (not copied) from your
#   hyprland.conf, so any edit here takes effect after `hyprctl reload` — no per-user copy to drift.
#
# =====================================================================
#  USER INTEGRATION  (item DOCS: Mode A — this comment IS the hotkey doc)
# =====================================================================
#  Add ONE line to ~/.config/hypr/hyprland.conf (install.sh prints it; we never edit
#  your hyprland.conf for you):
#
#      source = /home/dustin/projects/voice-typing/hypr-binds.conf
#
#  Then reload Hyprland:
#      hyprctl reload
#
#  CTRL+SUPER+ALT+D = the BIG model (high accuracy, slower finals).
#  SUPER+ALT+D      = the LITTLE/lite model (small.en only — faster finals, ~half the VRAM,
#                     lower accuracy; good for short quips/prompts).
#  The daemon must be running (start it with ./install.sh or the systemd user unit); it boots
#  NOT-listening, so the FIRST press of either key arms it in that mode. Each key toggles
#  listening on/off IN ITS OWN MODE. To SWITCH modes: press the currently-active key to stop,
#  then the other key to start in its mode (switching reloads the model set, ~1–3 s).
#
# PRECEDENCE / CONFLICTS
#   Hyprland uses the LAST matching bind for a given MODS+key. So `source` this file
#   LAST (at the bottom of ~/.config/hypr/hyprland.conf) so its binds win.
#   If a bind is inert, your config may already bind that MODS+key elsewhere — check
#       ~/.config/hypr/custom/keybinds.conf
#       ~/.config/hypr/hyprland/keybinds.conf
#   or rebind below to a free combo.
#
# MODS SYNTAX
#   MODS split on whitespace OR underscore: `CTRL SUPER ALT` == `CTRL_SUPER_ALT` (both valid).
#   See https://wiki.hypr.land/Configuring/Basics/Binds/

# BIG model (normal mode): distil-large-v3 + small.en — high accuracy.
bind = CTRL SUPER ALT, D, exec, /home/dustin/projects/voice-typing/.venv/bin/voicectl toggle
# LITTLE model (lite mode, PRD §4.2ter): small.en only — faster finals + ~half the VRAM, lower accuracy.
bind = SUPER ALT, D, exec, /home/dustin/projects/voice-typing/.venv/bin/voicectl toggle-lite
